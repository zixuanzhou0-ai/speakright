name: Build Windows Desktop

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate desktop build
        run: npm run validate:desktop-ci

      - name: Enforce public release signing
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run desktop:release-gate

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: speakright-windows-installers
          path: |
            src-tauri/target/release/speakright.exe
            src-tauri/target/release/bundle/*_release-report.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
